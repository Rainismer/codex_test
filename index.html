<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>

      <section class="hud" aria-live="polite">
        <p>Score: <strong id="score">0</strong></p>
        <p id="status">Running</p>
      </section>

      <div id="board" class="board" role="grid" aria-label="Snake board"></div>

      <section class="actions">
        <button id="pauseBtn" type="button">Pause</button>
        <button id="restartBtn" type="button">Restart</button>
      </section>

      <section class="controls" aria-label="Direction controls">
        <button class="control up" data-direction="up" type="button">Up</button>
        <button class="control left" data-direction="left" type="button">Left</button>
        <button class="control right" data-direction="right" type="button">Right</button>
        <button class="control down" data-direction="down" type="button">Down</button>
      </section>

      <p class="hint">Keyboard: Arrow keys or WASD. Space to pause. R to restart.</p>
    </main>

    <script src="./snake-logic.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
